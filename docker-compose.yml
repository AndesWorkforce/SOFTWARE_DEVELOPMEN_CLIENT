# =============================================================================

# docker-compose.yml — solo para Portainer / Swarm
#
# Usar este archivo en Portainer al crear/actualizar el stack.
# Docker Swarm no admite "profiles"; los servicios de desarrollo local están
# en docker-compose.local.yml
# =============================================================================
version: "3.8"

services:
  software-developmen-client:
    image: ghcr.io/andesworkforce/software_developmen_client:latest
    networks:
      - traefik-public
      - default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        - "traefik.http.routers.software-developmen-client.rule=Host(`pulse-andes-workforce.com`)"
        - "traefik.http.routers.software-developmen-client.entrypoints=websecure"
        - "traefik.http.routers.software-developmen-client.tls=true"
        - "traefik.http.routers.software-developmen-client.tls.certresolver=letsencrypt"
        - "traefik.http.services.software-developmen-client.loadbalancer.server.port=3000"

      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    environment:
      NODE_ENV: production
      PORT: "${PORT:-3000}"

networks:
  default:
    name: andes-software-developmen-client-net
    driver: overlay
  traefik-public:
    external: true
