# ============================================================
# CI/CD — Build → GHCR → Portainer
#
# Secrets required (repo Settings → Secrets → Actions):
#   PORTAINER_WEBHOOK_URL  →  URL del webhook del stack en Portainer
#                             (Portainer → Stack → <nombre> → Webhook)
#
# El GITHUB_TOKEN lo provee Actions automáticamente; no hace falta
# configurarlo manualmente.
# ============================================================
name: Build, Push & Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: andesworkforce/software_developmen_client

jobs:
  build-and-deploy:
    name: Build image → push GHCR → redeploy Portainer
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # necesario para push a GHCR

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Buildx (habilita cache multicapa y multi-platform si hace falta)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Login GHCR ──────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Metadata (tags + labels OCI) ────────────────────────────────────
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # sha corto para trazabilidad (sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # :latest en main (explícito para que siempre se publique)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── 5. Build & Push ─────────────────────────────────────────────────────
      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner # stage final del Dockerfile (Next.js standalone)
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_ENV=production
            NEXT_PUBLIC_API_BASE_URL_DEV=http://localhost:3001
            NEXT_PUBLIC_API_BASE_URL_STAGING=https://api-staging.andesworkforce.com
            NEXT_PUBLIC_API_BASE_URL_PROD=https://api.pulse-aw.com
          #cache-from: type=gha
          #cache-to: type=gha,mode=max

      # ── 6. Webhook → Portainer redeploy ─────────────────────────────────────
      - name: Trigger Portainer stack redeploy
        run: |
          if [ -z "${{ secrets.PORTAINER_WEBHOOK_URL }}" ]; then
            echo "::error::PORTAINER_WEBHOOK_URL no está configurado. Ve a Settings → Secrets and variables → Actions y añade el secret con la URL del webhook del stack en Portainer."
            exit 1
          fi
          curl -f -v -4 -X POST \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            --connect-timeout 10 \
            "${{ secrets.PORTAINER_WEBHOOK_URL }}"
